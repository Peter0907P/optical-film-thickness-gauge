<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Optical Film Thickness Gauge Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; display: block; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .panel { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .flex-layout { display: table; width: 100%; }
        .chart-box { display: table-cell; width: 65%; vertical-align: top; padding-right: 20px; }
        .control-box { display: table-cell; width: 35%; vertical-align: top; background: #fafbfc; padding: 20px; border-radius: 8px; border: 1px solid #e1e4e8; }
        .btn { display: block; width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #2980b9; }
        .result-box { margin-top: 25px; padding: 15px; background: #e8f8f5; border-left: 5px solid #2ecc71; border-radius: 4px; }
        .result-value { font-size: 28px; color: #27ae60; font-weight: bold; margin-top: 5px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #34495e; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 15px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔬 光學測量膜厚儀控制面板<br><small style="font-size: 14px; color: #7f8c8d;">Optical Film Thickness Gauge</small></h1>
    
    <div class="panel flex-layout">
        <div class="chart-box">
            <canvas id="spectrumChart" style="width: 100%; height: 400px;"></canvas>
        </div>
        
        <div class="control-box">
            <h3>量測參數設定</h3>
            <label>初始厚度猜測值 (nm):</label>
            <input type="number" id="initial-guess" value="100" min="10" max="2000">
            
            <button class="btn" id="measure-btn">一鍵觸發即時量測</button>
            
            <div class="result-box">
                <div>系統計算實測膜厚結果：</div>
                <div class="result-value"><span id="thickness-display">--</span> nm</div>
            </div>
        </div>
    </div>
</div>

<script>
    let chart;
    const ctx = document.getElementById('spectrumChart').getContext('2d');

    // 初始化空白圖表
    function initChart() {
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: '實測光譜 (Measured R)', data: [], borderColor: '#3498db', backgroundColor: 'transparent', borderDash: [2, 2], pointRadius: 1 },
                    { label: '演算法擬合曲線 (Fitted R)', data: [], borderColor: '#e74c3c', backgroundColor: 'transparent', pointRadius: 0, borderWidth: 3 }
                ]
            },
            options: { responsive: true, scales: { x: { title: { display: true, text: '波長 Wavelength (nm)' } }, y: { title: { display: true, text: '反射率 Reflectance' }, min: 0, max: 1 } } }
        });
    }
    initChart();

    // 點擊量測按鈕
    document.getElementById('measure-btn').addEventListener('click', async () => {
        const guess = parseFloat(document.getElementById('initial-guess').value);
        document.getElementById('thickness-display').innerText = "計算中...";

        try {
            // 呼叫後端 API (使用相對路徑，Render 部署才不會壞)
            const response = await fetch('/api/measure', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initial_guess: guess })
            });
            const result = await response.json();

            if (result.status === "success") {
                // 1. 更新數據顯示
                document.getElementById('thickness-display').innerText = result.thickness_nm;
                
                // 2. 更新圖表曲線
                chart.data.labels = result.wavelengths.map(w => Math.round(w));
                chart.data.datasets[0].data = result.measured_R;
                chart.data.datasets[1].data = result.fitted_R;
                chart.update();
            }
        } catch (error) {
            console.error("量測失敗:", error);
            document.getElementById('thickness-display').innerText = "錯誤";
            alert("無法連線至後端伺服器！");
        }
    });
</script>
</body>
</html>
